  <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Puzzle Gambar Level</title>

<style>

body{
    font-family: Cooper Black;
    text-align: center;
    background: linear-gradient(to right, hsl(208, 87%, 12%), #844ba7);
    color: white;
    margin: 0;
    padding: 20px;
}

h1{
    margin-top: 20px;
}

/* TOMBOL BERANDA */
.backHome{
    position: fixed;
    top: 20px;
    left: 20px;
    background: white;
    color: black;
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 14px;
    z-index: 9999;
    border: none;
    cursor: pointer;
    font-family: Cooper Black;
    transition: 0.3s;
}

.backHome:hover{
    background: #00c6ff;
    color: white;
    transform: scale(1.05);
}

/* WRAPPER */
.wrapper{
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 40px;
    margin-top: 20px;
    flex-wrap: wrap;
}

/* GAME */
.gameSection{
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* BOARD */
#game{
    display: grid;
    gap: 3px;
    width: 300px;
    height: 300px;
}

/* TILE */
.tile{
    width: 100%;
    height: 100%;
    background-size: 300px 300px;
    cursor: pointer;
    transition: 0.2s;
}

.tile:hover{
    transform: scale(0.98);
}

.empty{
    background: #83cfff;
}

/* PREVIEW */
.preview{
    display: flex;
    flex-direction: column;
    align-items: center;
}

.preview img{
    width: 200px;
    border-radius: 10px;
    box-shadow: 0 0 15px black;
}

/* BIODATA */
.biodata{
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(255,255,255,0.15);
    padding: 15px;
    border-radius: 15px;
    width: 300px;
    box-shadow: 0 0 10px rgba(0,0,0,0.4);
    backdrop-filter: blur(5px);
    text-align: left;
}

.biodata h3{
    margin-top: 0;
    color: #ffd700;
    text-align: center;
}

.biodata p{
    margin: 8px 0;
    font-size: 15px;
}

/* BUTTON */
.controls{
    margin-top: 15px;
}

button{
    padding: 10px 18px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    background: #8b55ff;
    color: white;
    font-weight: bold;
    font-family: Cooper Black;
    cursor: pointer;
    transition: 0.3s;
}

button:hover{
    background: #00c6ff;
    transform: scale(1.05);
}

/* WIN */
#winOverlay{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    visibility: hidden;
    opacity: 0;
    transition: 0.5s;
    z-index: 9999;
}

#winOverlay.show{
    visibility: visible;
    opacity: 1;
}

.winBox{
    background: white;
    color: #333;
    padding: 30px 50px;
    border-radius: 20px;
    font-size: 28px;
    font-weight: bold;
    animation: zoom 0.5s ease;
    box-shadow: 0 0 20px #00ffcc;
}

@keyframes zoom{

    from{
        transform: scale(0.5);
        opacity: 0;
    }

    to{
        transform: scale(1);
        opacity: 1;
    }
}

</style>
</head>

<body>

<!-- TOMBOL BERANDA -->
<button class="backHome"
onclick="window.location.href='index.html'">

⬅ Beranda

</button>

<!-- AUDIO -->
<audio id="klikSound" src="Kotak.mp3"></audio>
<audio id="winSound" src="win.mp3"></audio>
<audio id="bgMusic" src="bg.music.mpeg"></audio>
<audio id="shuffleSound" src="Acak.mp3"></audio>
<audio id="nextSound" src="Acak.mp3"></audio>

<!-- WIN -->
<div id="winOverlay">
    <div class="winBox">🎉 Level Selesai!</div>
</div>

<h1>🧩 Puzzle Gambar</h1>
<h3 id="levelText">Level 1</h3>

<div class="wrapper">

    <!-- GAME -->
    <div class="gameSection">

        <div id="game"></div>

        <div class="controls">
            <button onclick="shuffleBoard()">ACAK</button>
            <button onclick="nextLevel()">NEXT</button>
        </div>

    </div>

    <!-- PREVIEW -->
    <div class="preview">

        <h3>Gambar Asli</h3>

        <img id="preview" src="Puzzle1.png">

    </div>

</div>


<script>

let level = 1;
let gridSize;
let tiles = [];
let emptyIndex;

/* SOUND */
const clickSound = document.getElementById("klikSound");
const winSound = document.getElementById("winSound");
const bgMusic = document.getElementById("bgMusic");
const shuffleSound = document.getElementById("shuffleSound");
const nextSound = document.getElementById("nextSound");

/* MUSIC */
bgMusic.loop = true;
bgMusic.volume = 0.5;

document.body.addEventListener("click", () => {
    bgMusic.play();
}, { once: true });

/* IMAGE */
function getImage(level){

    if(level <= 1) return "Puzzle1.png";
    else if(level <= 2) return "Puzzle2.png";
    else if(level <= 3) return "Puzzle3.png";
    else if(level <= 4) return "Puzzle4.png";
    else if(level <= 5) return "Puzzle5.png";
    else if(level <= 6) return "Puzzle6.png";
    else if(level <= 7) return "Puzzle7.png";
    else if(level <= 8) return "Puzzle8.png";
    else if(level <= 9) return "Puzzle9.png";
    else if(level <= 10) return "Puzzle10.png";

    return "Puzzle1.png";
}

/* GRID */
function getGridSize(level){

    if(level <= 2) return 2;
    else if(level <= 4) return 3;
    else if(level <= 8) return 4;

    return 5;
}

/* START */
function startLevel(){

    gridSize = getGridSize(level);

    document.getElementById("levelText").innerText =
    "Level " + level;

    const game = document.getElementById("game");

    game.innerHTML = "";

    game.style.gridTemplateColumns =
    `repeat(${gridSize}, 1fr)`;

    tiles = [];

    for(let i = 0; i < gridSize * gridSize; i++){
        tiles.push(i);
    }

    do{
        shuffle(tiles);
    }
    while(checkSolved() || !isSolvable(tiles));

    emptyIndex = tiles.indexOf(tiles.length - 1);

    document.getElementById("preview").src =
    getImage(level);

    render();
}

/* RENDER */
function render(){

    const game = document.getElementById("game");

    game.innerHTML = "";

    let image = getImage(level);

    tiles.forEach((num, index) => {

        let div = document.createElement("div");

        div.classList.add("tile");

        if(num === tiles.length - 1){

            div.classList.add("empty");

        }else{

            let x = (num % gridSize) * (300 / gridSize);
            let y = Math.floor(num / gridSize) * (300 / gridSize);

            div.style.backgroundImage = `url(${image})`;
            div.style.backgroundPosition = `-${x}px -${y}px`;
        }

        div.onclick = () => move(index);

        game.appendChild(div);
    });
}

/* MOVE */
function move(index){

    let row = Math.floor(index / gridSize);
    let col = index % gridSize;

    let emptyRow = Math.floor(emptyIndex / gridSize);
    let emptyCol = emptyIndex % gridSize;

    let isAdjacent =
        (row === emptyRow && Math.abs(col - emptyCol) === 1) ||
        (col === emptyCol && Math.abs(row - emptyRow) === 1);

    if(isAdjacent){

        [tiles[index], tiles[emptyIndex]] =
        [tiles[emptyIndex], tiles[index]];

        emptyIndex = index;

        clickSound.currentTime = 0;
        clickSound.play();

        render();

        checkWin();
    }
}

/* SHUFFLE BUTTON */
function shuffleBoard(){

    shuffleSound.currentTime = 0;
    shuffleSound.play();

    do{
        shuffle(tiles);
    }
    while(checkSolved() || !isSolvable(tiles));

    emptyIndex = tiles.indexOf(tiles.length - 1);

    render();
}

/* NEXT */
function nextLevel(){

    nextSound.currentTime = 0;
    nextSound.play();

    level++;

    if(level > 10){
        level = 1;
    }

    startLevel();
}

/* CHECK */
function checkSolved(){

    for(let i = 0; i < tiles.length; i++){

        if(tiles[i] !== i){
            return false;
        }
    }

    return true;
}

/* WIN */
function checkWin(){

    let win = true;

    for(let i = 0; i < tiles.length; i++){

        if(tiles[i] !== i){

            win = false;
            break;
        }
    }

    if(win){

        winSound.currentTime = 0;
        winSound.play();

        document.getElementById("winOverlay")
        .classList.add("show");

        setTimeout(() => {

            document.getElementById("winOverlay")
            .classList.remove("show");

            level++;

            if(level > 10){

                alert("Kamu menyelesaikan semua level!");

                level = 1;
            }

            startLevel();

        }, 1500);
    }
}

/* RANDOM */
function shuffle(array){

    for(let i = array.length - 1; i > 0; i--){

        let j = Math.floor(Math.random() * (i + 1));

        [array[i], array[j]] =
        [array[j], array[i]];
    }
}

/* SOLVABLE */
function isSolvable(arr){

    let inversions = 0;

    for(let i = 0; i < arr.length; i++){

        for(let j = i + 1; j < arr.length; j++){

            if(
                arr[i] !== arr.length - 1 &&
                arr[j] !== arr.length - 1 &&
                arr[i] > arr[j]
            ){
                inversions++;
            }
        }
    }

    /* GRID GANJIL */
    if(gridSize % 2 !== 0){
        return inversions % 2 === 0;
    }

    /* GRID GENAP */
    let emptyRow =
    Math.floor(arr.indexOf(arr.length - 1) / gridSize);

    let rowFromBottom = gridSize - emptyRow;

    if(rowFromBottom % 2 === 0){
        return inversions % 2 !== 0;
    }else{
        return inversions % 2 === 0;
    }
}

/* START GAME */
startLevel();

</script>

</body>
</html>
