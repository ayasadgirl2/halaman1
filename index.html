<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Web App Nca</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(to right, hsl(208, 87%, 12%), #844ba7);
    color:white;
    text-align:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
    margin:40px auto;
    background:rgba(255,255,255,0.1);
    padding:30px 20px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.profile-img{
    width:120px;
    height:120px;
    max-width:30vw;
    max-height:30vw;

    border-radius:50%;
    object-fit:cover;
    border:4px solid white;

    margin-bottom:20px;

    box-shadow:0 0 20px rgba(255,255,255,0.5);
}

h1{
    margin-bottom:10px;
    font-size:clamp(28px,5vw,40px);
}

.subtitle{
    margin-bottom:30px;
    font-size:clamp(14px,3vw,18px);
}

.profile{
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
    margin-bottom:30px;
}

.profile p{
    line-height:1.6;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:15px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

button:hover{
    transform:translateY(-2px);
}

.page{
    display:none;
}

.active{
    display:block;
}

.btn-game{
    background:#00c6ff;
    color:white;
}

.btn-belajar{
    background:#9b59b6;
    color:white;
}

.btn-tiktok{
    background:#111;
    color:white;
}

.btn-donate{
    background:#00ff00;
    color:white;
}

.btn-koin{
    background:#ffc400;
    color:white;
}

.back{
    margin-top:20px;
    background:white;
    color:black;
}

/* RESPONSIVE HP */

@media (max-width:480px){

    .container{
        padding:20px 15px;
    }

    .profile-img{
        width:100px;
        height:100px;
    }

    button{
        font-size:14px;
        padding:14px;
    }
}

</style>
</head>

<body>

<!-- BERANDA -->

<div id="home" class="page active">

    <div class="container">

        <img src="Profil2.jpeg" alt="Foto Profil" class="profile-img">

        <h1>KAK N.A.D</h1>

        <p class="subtitle">
            Haii!! Welcome Dari Ayi ✨
        </p>

        <div class="profile">
            <p><b>🔥 Menerima Colab Game Free Fire 🔥</b></p>
        </div>

        <div class="menu">
            <button class="btn-donate"
            onclick="window.open('https://sociabuzz.com/yayiyu18/tribe')">
                💚 Donate
            </button>

            <button class="btn-koin"
            onclick="window.open('https://www.tiktok.com/coin?rc=Y7SFZ3SR&rie=')">
                🪙 Koin TikTok Murah
            </button>
            <button class="btn-belajar"
            onclick="window.location.href='Toko.html'">
                🛒 Toko
            </button>

            <button class="btn-tiktok"
            onclick="window.open('https://www.tiktok.com/@nor.aisyah.disni')">
                🎵 TikTok
            </button>

    
        </div>

    </div>

</div>

<!-- HALAMAN PEMBELAJARAN -->

<div id="belajar" class="page">

    <div class="container">

        <h1>📚 Halaman Pembelajaran</h1>

        <p style="margin-top:15px;">
            Di sini nanti kamu bisa menambahkan materi pembelajaran.
        </p>

        <button class="back"
        onclick="showPage('home')">
            ⬅ Kembali
        </button>

    </div>

</div>

<script>

function showPage(pageId){

    let pages = document.querySelectorAll('.page');

    pages.forEach(function(page){
        page.classList.remove('active');
    });

    document.getElementById(pageId).classList.add('active');
}

</script>

</body>
</html>
